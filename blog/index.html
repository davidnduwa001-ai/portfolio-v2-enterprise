<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog — David Nduwa</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  <header class="bg-gradient-to-br from-brand-700 via-brand-600 to-fuchsia-500 py-14 text-white">
    <div class="mx-auto max-w-5xl px-6"><a href="../index.html#blog" class="text-white/90 hover:underline">← Back</a>
      <h1 class="mt-4 text-3xl font-bold">Blog / Knowledge Hub</h1>
    </div>
  </header>
  <main class="mx-auto max-w-5xl px-6 py-10">
    <div class="mb-6">
      <input id="search" type="search" placeholder="Search posts..." class="input input-bordered w-full" />
    </div>
    <ul id="posts" class="space-y-2">
      <li data-tags="Azure"><a class="link link-primary" href="how-i-built-azure-landing-zone.html">How I Built My Azure Landing Zone</a> — <small class="text-slate-500">2025-10-10</small></li>
      <li data-tags="Terraform"><a class="link link-primary" href="terraform-vs-portal.html">Terraform vs Azure Portal: My Tests</a> — <small class="text-slate-500">2025-11-08</small></li>
    </ul>
  </main>

  <script>
    const input = document.getElementById('search');
    const items = Array.from(document.querySelectorAll('#posts li'));
    input.addEventListener('input', ()=>{
      const q = input.value.toLowerCase();
      items.forEach(li=>{
        li.style.display = li.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    });
  </script>
</body>
</html>
